<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Date Asian Men</title>

<!-- React + Babel via CDN. Requires an internet connection on first load. -->
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap');

:root{
  --ivory:#F7F1E8; --paper:#FFFDF9; --ink:#2A211C; --ink-soft:#6B5D54;
  --cinnabar:#B23A2E; --cinnabar-deep:#8E2C22; --clay:#C07B58; --brass:#B08545;
  --line:#E7DBC9; --shadow:rgba(58,40,28,.12);
}
*{box-sizing:border-box}
html,body{margin:0}
body{
  background:var(--ivory); color:var(--ink);
  font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased;
}
.dam-serif{font-family:'Fraunces',Georgia,serif}
.dam-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;font-weight:600}
.dam-wrap{max-width:1120px;margin:0 auto;padding:0 28px}

/* ---------- header ---------- */
.dam-head{position:sticky;top:0;z-index:30;background:rgba(247,241,232,.82);
  backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.dam-head-in{display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;max-width:1120px;margin:0 auto;gap:20px;flex-wrap:wrap}
.dam-mark h1{font-family:'Fraunces',serif;font-size:23px;font-weight:600;letter-spacing:-.01em;line-height:1;margin:0}
.dam-mark .dot{color:var(--cinnabar)}
.dam-tabs{display:flex;gap:4px;background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:4px}
.dam-tab{appearance:none;border:0;background:transparent;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:500;color:var(--ink-soft);padding:8px 18px;border-radius:999px;transition:all .2s}
.dam-tab:hover{color:var(--ink)}
.dam-tab[data-on="true"]{background:var(--ink);color:var(--ivory)}
.dam-nav-right{display:flex;align-items:center;gap:18px}
.dam-link{appearance:none;border:0;background:none;cursor:pointer;font-family:inherit;
  font-size:13px;font-weight:500;color:var(--ink-soft);padding:6px 2px;position:relative;transition:color .18s}
.dam-link:hover{color:var(--ink)}
.dam-link[data-on="true"]{color:var(--ink)}
.dam-link[data-on="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1.5px;background:var(--cinnabar)}
.dam-liked{display:flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:13px;font-weight:500}
.dam-liked svg{color:var(--cinnabar)}
.dam-avatar{width:40px;height:40px;border-radius:999px;border:1px solid var(--line);cursor:pointer;
  display:flex;align-items:center;justify-content:center;color:#fff;font-family:'Fraunces',serif;
  font-weight:500;font-size:18px;padding:0;transition:box-shadow .18s,transform .18s}
.dam-avatar:hover{transform:translateY(-1px)}
.dam-avatar[data-on="true"]{box-shadow:0 0 0 2px var(--ivory),0 0 0 4px var(--cinnabar)}

/* ---------- shared page chrome ---------- */
.dam-stage{padding:42px 0 70px}
.dam-pagehead{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:24px;flex-wrap:wrap}
.dam-pagehead h2{font-family:'Fraunces',serif;font-size:34px;font-weight:500;letter-spacing:-.02em;margin:0 0 6px;line-height:1}
.dam-pagehead p{margin:0;color:var(--ink-soft);font-size:14px;max-width:46ch}
.dam-show{display:flex;align-items:center;gap:8px}
.dam-show .dam-label{color:var(--ink-soft)}
.dam-chip{appearance:none;border:1px solid var(--line);background:var(--paper);cursor:pointer;
  font-family:inherit;font-size:12.5px;font-weight:500;color:var(--ink-soft);padding:7px 14px;border-radius:999px;transition:all .18s}
.dam-chip:hover{border-color:var(--clay);color:var(--ink)}
.dam-chip[data-on="true"]{background:var(--cinnabar);border-color:var(--cinnabar);color:#fff}

/* ---------- portrait + profile body ---------- */
.dam-feature{background:var(--paper);border:1px solid var(--line);border-radius:6px;overflow:hidden;
  display:grid;grid-template-columns:minmax(0,44%) minmax(0,56%);box-shadow:0 24px 60px -34px var(--shadow)}
.dam-portrait{position:relative;min-height:520px;display:flex;align-items:center;justify-content:center}
.dam-portrait .frame{position:absolute;inset:18px;border:1px solid rgba(255,253,249,.5)}
.dam-mono{font-family:'Fraunces',serif;font-weight:500;color:rgba(255,253,249,.94);
  font-size:148px;line-height:1;text-shadow:0 2px 20px rgba(0,0,0,.18)}
.dam-portrait .pin{position:absolute;left:22px;bottom:22px;display:flex;align-items:center;gap:5px;
  background:rgba(42,33,28,.7);color:var(--ivory);padding:6px 12px;border-radius:999px;
  font-size:12px;font-weight:500;backdrop-filter:blur(4px)}
.dam-portrait .pin svg{width:13px;height:13px}

.dam-detail{padding:40px 42px;display:flex;flex-direction:column}
.dam-eyebrow{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:14px;border-bottom:1px solid var(--brass);margin-bottom:24px}
.dam-eyebrow .dam-label{color:var(--brass)}
.dam-count{font-family:'Fraunces',serif;font-size:13px;color:var(--ink-soft);letter-spacing:.04em}
.dam-name{font-family:'Fraunces',serif;font-weight:500;font-size:52px;line-height:.98;letter-spacing:-.02em;margin:0 0 4px}
.dam-name .age{color:var(--clay)}
.dam-role{color:var(--ink-soft);margin:0 0 22px}
.dam-role .dam-label{color:var(--cinnabar)}
.dam-quote{font-family:'Fraunces',serif;font-style:italic;font-weight:400;font-size:22px;line-height:1.42;margin:0 0 26px;color:var(--ink)}
.dam-tags{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 26px}
.dam-tag{font-size:12.5px;color:var(--ink-soft);border:1px solid var(--line);padding:5px 12px;border-radius:999px;background:var(--ivory)}
.dam-meta{margin:0 0 30px}
.dam-meta .dam-label{color:var(--ink-soft);display:block;margin-bottom:4px}
.dam-meta .val{font-family:'Fraunces',serif;font-size:16px}
.dam-actions{margin-top:auto;display:flex;gap:12px;flex-wrap:wrap}

.dam-btn{appearance:none;font-family:inherit;cursor:pointer;font-size:15px;font-weight:600;
  padding:14px 26px;border-radius:4px;display:inline-flex;align-items:center;gap:9px;transition:all .18s}
.dam-btn-primary{background:var(--cinnabar);border:1px solid var(--cinnabar);color:#fff}
.dam-btn-primary:hover{background:var(--cinnabar-deep);border-color:var(--cinnabar-deep)}
.dam-btn-ghost{background:transparent;border:1px solid var(--ink);color:var(--ink);flex:1;justify-content:center;min-width:150px}
.dam-btn-ghost:hover{background:var(--ink);color:var(--ivory)}
.dam-btn-ghost svg{transition:transform .18s}
.dam-btn-ghost:hover svg.dam-arrow{transform:translateX(4px)}

@keyframes damIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.dam-anim{animation:damIn .42s cubic-bezier(.2,.7,.2,1)}

/* ---------- end card ---------- */
.dam-end{background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:70px 40px;text-align:center;box-shadow:0 24px 60px -34px var(--shadow)}
.dam-end h3{font-family:'Fraunces',serif;font-weight:500;font-size:32px;margin:0 0 10px}
.dam-end p{color:var(--ink-soft);margin:0 0 26px}
.dam-end .row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ---------- directory ---------- */
.dam-controls{display:flex;gap:14px;align-items:center;margin-bottom:30px;flex-wrap:wrap}
.dam-filters{display:flex;gap:8px}
.dam-search{position:relative;flex:1;min-width:220px}
.dam-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--ink-soft)}
.dam-search input{width:100%;font-family:inherit;font-size:14px;color:var(--ink);background:var(--paper);
  border:1px solid var(--line);border-radius:999px;padding:11px 16px 11px 40px;outline:none;transition:border-color .18s}
.dam-search input:focus{border-color:var(--clay)}
.dam-search input::placeholder{color:var(--ink-soft)}

.dam-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.dam-card{background:var(--paper);border:1px solid var(--line);border-radius:6px;overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.dam-card:hover{transform:translateY(-4px);box-shadow:0 22px 44px -28px var(--shadow)}
.dam-card-port{position:relative;aspect-ratio:5/4;display:flex;align-items:center;justify-content:center}
.dam-card-port .mono{font-family:'Fraunces',serif;font-weight:500;font-size:72px;color:rgba(255,253,249,.94)}
.dam-cardlike{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:999px;border:0;cursor:pointer;
  background:rgba(42,33,28,.55);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;transition:background .18s}
.dam-cardlike:hover{background:rgba(42,33,28,.78)}
.dam-cardlike svg{width:17px;height:17px;color:#fff;transition:all .18s}
.dam-cardlike[data-on="true"] svg{color:var(--cinnabar);fill:var(--cinnabar)}
.dam-card-body{padding:18px 20px 20px}
.dam-card-name{font-family:'Fraunces',serif;font-weight:500;font-size:22px;margin:0;line-height:1}
.dam-card-name .age{color:var(--clay)}
.dam-card-loc{display:flex;align-items:center;gap:5px;color:var(--ink-soft);font-size:13px;margin:7px 0 12px}
.dam-card-loc svg{width:13px;height:13px}
.dam-card-role{font-size:12.5px;color:var(--cinnabar);font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin:0 0 10px}
.dam-card-tags{display:flex;gap:6px;flex-wrap:wrap}
.dam-card-tags span{font-size:11.5px;color:var(--ink-soft);background:var(--ivory);border:1px solid var(--line);padding:3px 9px;border-radius:999px}
.dam-empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink-soft)}
.dam-empty .dam-serif{font-size:24px;color:var(--ink);display:block;margin-bottom:6px}

/* ---------- about ---------- */
.dam-about-eyebrow{color:var(--brass);margin:0 0 18px}
.dam-about-lead{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(30px,4.6vw,50px);
  line-height:1.08;letter-spacing:-.02em;margin:0;max-width:20ch}
.dam-about-rule{height:1px;background:var(--brass);opacity:.5;margin:44px 0 0}
.dam-about-grid{display:grid;grid-template-columns:1fr 1fr;gap:44px 60px;margin-top:48px}
.dam-about-sec h4{margin:0 0 10px;color:var(--cinnabar)}
.dam-about-sec p{font-size:16.5px;line-height:1.62;color:var(--ink);margin:0}

/* ---------- account ---------- */
.dam-acct-section{margin-top:54px}
.dam-acct-section > .dam-label{color:var(--brass);display:block;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--line)}
.dam-settings{display:flex;flex-direction:column;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--paper)}
.dam-setrow{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:20px 24px;border-bottom:1px solid var(--line)}
.dam-setrow:last-child{border-bottom:0}
.dam-setrow .t{font-family:'Fraunces',serif;font-size:18px;margin:0 0 3px}
.dam-setrow .d{color:var(--ink-soft);font-size:13.5px;margin:0}
.dam-manage{appearance:none;border:1px solid var(--line);background:var(--ivory);cursor:pointer;
  font-family:inherit;font-size:13px;font-weight:500;color:var(--ink);padding:9px 18px;border-radius:999px;white-space:nowrap;transition:all .18s}
.dam-manage:hover{border-color:var(--clay)}

/* ---------- modal ---------- */
.dam-overlay{position:fixed;inset:0;z-index:50;background:rgba(42,33,28,.45);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:24px;animation:damFade .25s ease}
@keyframes damFade{from{opacity:0}to{opacity:1}}
.dam-modal{position:relative;max-width:880px;width:100%;max-height:90vh;overflow:auto;border-radius:6px}
.dam-modal .dam-feature{box-shadow:0 40px 90px -30px rgba(0,0,0,.45)}
.dam-close{position:absolute;top:14px;right:14px;z-index:2;width:38px;height:38px;border-radius:999px;border:0;cursor:pointer;
  background:rgba(255,253,249,.9);display:flex;align-items:center;justify-content:center}
.dam-close:hover{background:#fff}
.dam-close svg{width:18px;height:18px;color:var(--ink)}

/* ---------- toast ---------- */
.dam-toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%);z-index:60;background:var(--ink);color:var(--ivory);
  padding:13px 22px;border-radius:999px;font-size:14px;font-weight:500;box-shadow:0 16px 40px -16px rgba(0,0,0,.5);
  animation:damToast .3s ease;display:flex;align-items:center;gap:9px}
.dam-toast svg{width:15px;height:15px;color:var(--clay)}
@keyframes damToast{from{opacity:0;transform:translate(-50%,12px)}to{opacity:1;transform:translate(-50%,0)}}

/* ---------- footer ---------- */
.dam-foot{border-top:1px solid var(--line);padding:34px 0;margin-top:20px}
.dam-foot-in{max-width:1120px;margin:0 auto;padding:0 28px;display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;color:var(--ink-soft);font-size:13px}
.dam-foot .dam-serif{font-size:17px;color:var(--ink)}

.dam-focus:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

@media (max-width:840px){
  .dam-feature{grid-template-columns:1fr}
  .dam-portrait{min-height:340px}
  .dam-mono{font-size:108px}
  .dam-detail{padding:30px 26px}
  .dam-name{font-size:42px}
  .dam-grid{grid-template-columns:repeat(2,1fr)}
  .dam-about-grid{grid-template-columns:1fr;gap:34px}
}
@media (max-width:560px){
  .dam-wrap,.dam-head-in,.dam-foot-in{padding-left:18px;padding-right:18px}
  .dam-grid{grid-template-columns:1fr}
  .dam-pagehead h2{font-size:28px}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

];

const SETTINGS = [
  { t: "Account & sign-in", d: "Email, password, and how you log in." },
  { t: "Who you'll see", d: "Set the people we feature for you." },
  { t: "Privacy & safety", d: "Blocking, reporting, and who can message you." },
  { t: "Notifications", d: "Choose what reaches you, and how." },
];

/* ================================================================ */
/*  Presentational pieces                                            */
/* ================================================================ */
function Portrait({ person, idx }) {
  return (
    <div className="dam-portrait" style={{ background: grad(idx) }}>
      <div className="frame" />
      <span className="dam-mono">{person.first[0]}</span>
      <span className="pin"><MapPin /> {person.city}</span>
    </div>
  );
}

function ProfileBody({ person, eyebrow = "Feature", count, children }) {
  return (
    <div className="dam-detail">
      <div className="dam-eyebrow">
        <span className="dam-label">{eyebrow}</span>
        {count ? <span className="dam-count">{count}</span> : null}
      </div>
      <h3 className="dam-name dam-serif">{person.first} {person.last} <span className="age">{person.age}</span></h3>
      <p className="dam-role"><span className="dam-label">{person.role}</span></p>
      <p className="dam-quote">“{person.bio}”</p>
      <div className="dam-tags">{person.tags.map((t) => <span className="dam-tag" key={t}>{t}</span>)}</div>
      <div className="dam-meta">
        <span className="dam-label">Looking for</span>
        <span className="val">{person.lookingFor}</span>
      </div>
      <div className="dam-actions">{children}</div>
    </div>
  );
}

function DirectoryCard({ person, idx, liked, onLike, onOpen }) {
  return (
    <div className="dam-card" onClick={() => onOpen(person)}>
      <div className="dam-card-port" style={{ background: grad(idx) }}>
        <span className="mono">{person.first[0]}</span>
        <button className="dam-cardlike dam-focus" data-on={liked}
          aria-label={liked ? `Unlike ${person.first}` : `Like ${person.first}`}
          onClick={(e) => { e.stopPropagation(); onLike(person.id); }}>
          <Heart />
        </button>
      </div>
      <div className="dam-card-body">
        <h3 className="dam-card-name">{person.first} {person.last} <span className="age">{person.age}</span></h3>
        <p className="dam-card-loc"><MapPin /> {person.city}</p>
        <p className="dam-card-role">{person.role}</p>
        <div className="dam-card-tags">{person.tags.slice(0, 3).map((t) => <span key={t}>{t}</span>)}</div>
      </div>
    </div>
  );
}

/* ================================================================ */
/*  Pages                                                            */
/* ================================================================ */
function ForYou({ liked, onHi, setRoute }) {
  const [show, setShow] = useState("men");
  const [idx, setIdx] = useState(0);
  useEffect(() => { setIdx(0); }, [show]);

  const stack = useMemo(() => PEOPLE.filter((p) => show === "everyone" || p.gender === show), [show]);
  const current = stack[idx];

  return (
    <main className="dam-wrap dam-stage">
      <div className="dam-pagehead">
        <div>
          <h2>For You</h2>
          <p>A short, curated selection of people we think you'll want to meet. Press Next to see the next profile.</p>
        </div>
        <div className="dam-show">
          <span className="dam-label">Show me</span>
          {[["men", "Men"], ["women", "Women"], ["everyone", "Everyone"]].map(([v, l]) => (
            <button key={v} className="dam-chip dam-focus" data-on={show === v} onClick={() => setShow(v)}>{l}</button>
          ))}
        </div>
      </div>

      {current ? (
        <article className="dam-feature dam-anim" key={current.id}>
          <Portrait person={current} idx={PEOPLE.indexOf(current)} />
          <ProfileBody person={current} count={`${String(idx + 1).padStart(2, "0")} / ${String(stack.length).padStart(2, "0")}`}>
            <button className="dam-btn dam-btn-primary dam-focus" onClick={() => { onHi(current); setIdx((i) => i + 1); }}>
              <Heart size={17} /> Say hi
            </button>
            <button className="dam-btn dam-btn-ghost dam-focus" onClick={() => setIdx((i) => i + 1)}>
              Next person <ArrowRight size={18} className="dam-arrow" />
            </button>
          </ProfileBody>
        </article>
      ) : (
        <div className="dam-end">
          <h3 className="dam-serif">That's everyone for now.</h3>
          <p>You've reached the end of this run. Browse the full directory, or start over.</p>
          <div className="row">
            <button className="dam-btn dam-btn-primary dam-focus" onClick={() => setRoute("directory")}>
              Browse the directory <ArrowRight size={18} className="dam-arrow" />
            </button>
            <button className="dam-btn dam-btn-ghost dam-focus" style={{ flex: "0 0 auto" }} onClick={() => setIdx(0)}>
              <RotateCcw size={17} /> Start over
            </button>
          </div>
        </div>
      )}
    </main>
  );
}

function Directory({ liked, onLike, onOpen }) {
  const [query, setQuery] = useState("");
  const [filter, setFilter] = useState("everyone");

  const list = useMemo(() => {
    const q = query.trim().toLowerCase();
    return PEOPLE.filter((p) => {
      if (filter === "men" && p.gender !== "man") return false;
      if (filter === "women" && p.gender !== "woman") return false;
      if (!q) return true;
      return (`${p.first} ${p.last}`.toLowerCase().includes(q) || p.city.toLowerCase().includes(q) ||
        p.role.toLowerCase().includes(q) || p.tags.join(" ").toLowerCase().includes(q));
    });
  }, [query, filter]);

  return (
    <main className="dam-wrap dam-stage">
      <div className="dam-pagehead">
        <div>
          <h2>The Directory</h2>
          <p>Our community is constantly growing. Stay tuned for more connections.</p>
        </div>
      </div>
      <div className="dam-controls">
        <div className="dam-filters">
          {[["everyone", "Everyone"], ["men", "Men"], ["women", "Women"]].map(([v, l]) => (
            <button key={v} className="dam-chip dam-focus" data-on={filter === v} onClick={() => setFilter(v)}>{l}</button>
          ))}
        </div>
        <div className="dam-search">
          <Search />
          <input aria-label="Search the directory" placeholder="Search by name, city, or interest"
            value={query} onChange={(e) => setQuery(e.target.value)} />
        </div>
      </div>
      <div className="dam-grid">
        {list.length === 0 && (
          <div className="dam-empty">
            <span className="dam-serif">No one matches that yet.</span>
            Try a different name, city, or interest.
          </div>
        )}
        {list.map((p) => (
          <DirectoryCard key={p.id} person={p} idx={PEOPLE.indexOf(p)}
            liked={liked.has(p.id)} onLike={onLike} onOpen={onOpen} />
        ))}
      </div>
    </main>
  );
}

function About() {
  return (
    <main className="dam-wrap dam-stage">
      <p className="dam-label dam-about-eyebrow">About</p>
      <h2 className="dam-about-lead">A quieter place to meet Asian men—and...</h2>
      <div className="dam-about-rule" />
      <div className="dam-about-grid">
        {ABOUT.map((s) => (
          <div className="dam-about-sec" key={s.label}>
            <h4 className="dam-label">{s.label}</h4>
            <p>{s.body}</p>
          </div>
        ))}
      </div>
    </main>
  );
}

function Account({ liked, onLike, onOpen, setRoute, flash }) {
  const likedPeople = PEOPLE.filter((p) => liked.has(p.id));
  return (
    <main className="dam-wrap dam-stage">
      <div className="dam-pagehead">
        <div>
          <h2>Your profile</h2>
          <p>This is how you appear to everyone else. Keep it true to you.</p>
        </div>
      </div>

      <article className="dam-feature dam-anim">
        <Portrait person={VIEWER} idx={VIEWER.gradIdx} />
        <ProfileBody person={VIEWER} eyebrow="Your profile">
          <button className="dam-btn dam-btn-primary dam-focus" onClick={() => flash("Profile editing isn't wired up in this prototype.")}>
            <User size={17} /> Edit profile
          </button>
          <button className="dam-btn dam-btn-ghost dam-focus" onClick={() => setRoute("foryou")}>
            See who's For You <ArrowRight size={18} className="dam-arrow" />
          </button>
        </ProfileBody>
      </article>

      <section className="dam-acct-section">
        <span className="dam-label">People you've liked</span>
        {likedPeople.length === 0 ? (
          <div className="dam-empty" style={{ border: "1px solid var(--line)", borderRadius: 6, background: "var(--paper)" }}>
            <span className="dam-serif">No one yet.</span>
            Tap the heart on a profile and they'll gather here.
          </div>
        ) : (
          <div className="dam-grid">
            {likedPeople.map((p) => (
              <DirectoryCard key={p.id} person={p} idx={PEOPLE.indexOf(p)}
                liked={true} onLike={onLike} onOpen={onOpen} />
            ))}
          </div>
        )}
      </section>

      <section className="dam-acct-section">
        <span className="dam-label">Settings</span>
        <div className="dam-settings">
          {SETTINGS.map((s) => (
            <div className="dam-setrow" key={s.t}>
              <div>
                <p className="t dam-serif">{s.t}</p>
                <p className="d">{s.d}</p>
              </div>
              <button className="dam-manage dam-focus" onClick={() => flash("Settings aren't available in this prototype yet.")}>Manage</button>
            </div>
          ))}
        </div>
      </section>
    </main>
  );
}

/* ================================================================ */
/*  App — state, routing, chrome                                     */
/* ================================================================ */
function App() {
  const [route, setRoute] = useState("foryou");          // foryou | directory | about | account
  const [liked, setLiked] = useState(() => new Set());
  const [open, setOpen] = useState(null);                 // profile shown in modal
  const [toast, setToast] = useState(null);
  const timer = useRef(null);

  const flash = (msg) => {
    setToast(msg);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setToast(null), 2600);
  };
  useEffect(() => () => clearTimeout(timer.current), []);

  const toggleLike = (id) => setLiked((prev) => {
    const n = new Set(prev);
    n.has(id) ? n.delete(id) : n.add(id);
    return n;
  });

  const sayHi = (p) => {
    setLiked((prev) => new Set(prev).add(p.id));
    flash(`Your hello is on its way to ${p.first}.`);
  };

  const browsing = route === "foryou" || route === "directory";

  return (
    <React.Fragment>
      <header className="dam-head">
        <div className="dam-head-in">
          <div className="dam-mark">
            <h1>Date Asian Men<span className="dot">.</span></h1>
          </div>
          <nav className="dam-tabs" role="tablist" aria-label="Browse">
            <button className="dam-tab dam-focus" data-on={route === "foryou"} onClick={() => setRoute("foryou")}>For You</button>
            <button className="dam-tab dam-focus" data-on={route === "directory"} onClick={() => setRoute("directory")}>Directory</button>
          </nav>
          <div className="dam-nav-right">
            <button className="dam-link dam-focus" data-on={route === "about"} onClick={() => setRoute("about")}>About</button>
            <span className="dam-liked"><Heart size={15} fill="currentColor" /> {liked.size} liked</span>
            <button className="dam-avatar dam-focus" data-on={route === "account"} aria-label="Your account"
              style={{ background: grad(VIEWER.gradIdx) }} onClick={() => setRoute("account")}>
              {VIEWER.first[0]}
            </button>
          </div>
        </div>
      </header>

      {route === "foryou" && <ForYou liked={liked} onHi={sayHi} setRoute={setRoute} />}
      {route === "directory" && <Directory liked={liked} onLike={toggleLike} onOpen={setOpen} />}
      {route === "about" && <About />}
      {route === "account" && <Account liked={liked} onLike={toggleLike} onOpen={setOpen} setRoute={setRoute} flash={flash} />}

      {open && (
        <div className="dam-overlay" onClick={() => setOpen(null)}>
          <div className="dam-modal" onClick={(e) => e.stopPropagation()}>
            <button className="dam-close dam-focus" aria-label="Close profile" onClick={() => setOpen(null)}><X /></button>
            <article className="dam-feature">
              <Portrait person={open} idx={PEOPLE.indexOf(open)} />
              <ProfileBody person={open} eyebrow="Profile">
                <button className="dam-btn dam-btn-primary dam-focus" onClick={() => { sayHi(open); setOpen(null); }}>
                  <Heart size={17} /> Say hi
                </button>
                <button className="dam-btn dam-btn-ghost dam-focus" onClick={() => setOpen(null)}>Close</button>
              </ProfileBody>
            </article>
          </div>
        </div>
      )}

      {toast && <div className="dam-toast" role="status"><Heart fill="currentColor" /> {toast}</div>}

      <footer className="dam-foot">
        <div className="dam-foot-in">
          <span className="dam-serif">Date Asian Men</span>
          <span>A place for Asian men and those that love them — prototype, sample profiles only</span>
        </div>
      </footer>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
